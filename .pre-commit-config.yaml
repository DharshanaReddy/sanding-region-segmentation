# Keep this minimal: lint + format only. No heavyweight hooks (no mypy, no
# notebook stripping magic) — the project already runs on constrained
# hardware, the dev tooling shouldn't add friction on top of that.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=2048]
